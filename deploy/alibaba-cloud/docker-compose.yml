services:
  nacos:
    image: nacos/nacos-server:v2.4.3-slim
    container_name: mall-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: ip
      JVM_XMS: 128m
      JVM_XMX: 384m
      NACOS_SERVER_IP: ${ALIYUN_IP}
    ports:
      - "8848:8848"
    volumes:
      - nacos_data:/home/nacos/data
    restart: unless-stopped
    mem_limit: 512m

  mall-gateway:
    image: mall-gateway:latest
    container_name: mall-gateway
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_IP: ${ALIYUN_IP}
      JWT_SECRET: ${JWT_SECRET:-mall-hj-secret-key-must-be-at-least-256-bits-long-for-hs256}
    depends_on:
      - nacos
    ports:
      - "8080:8080"
    restart: unless-stopped
    mem_limit: 200m

  nginx:
    image: nginx:alpine
    container_name: mall-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./mall-website-dist:/usr/share/nginx/html:ro
    depends_on:
      - mall-gateway
    restart: unless-stopped
    mem_limit: 64m

volumes:
  nacos_data:
